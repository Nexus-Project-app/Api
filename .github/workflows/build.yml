name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.x"

jobs:
  build-and-test:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Listing files
        run: ls -la

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore CleanArchitecture.slnx 2>&1 | tee restore.log

      - name: Build application
        run: dotnet build CleanArchitecture.slnx --configuration Release --no-restore 2>&1 | tee build.log
        if: success()

      - name: Test application
        run: dotnet test CleanArchitecture.slnx --configuration Release --no-restore --no-build 2>&1 | tee test.log
        if: success()

      - name: Publish application
        run: dotnet publish CleanArchitecture.slnx --configuration Release --no-restore --no-build --output publish 2>&1 | tee publish.log
        if: success()

      - name: Upload build artifact and logs
        uses: actions/upload-artifact@v4
        with:
          name: build-publish
          path: |
            publish/
            restore.log
            build.log
            test.log
            publish.log
  
  docker:
    name: Build & Push Docker Image
    runs-on: [self-hosted, nexus, front]
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Build
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch,suffix=-latest
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}